name: Swift Build

on:
  push:
    branches: ["main"]
    paths:
      - "GooseSwift/**"
      - "GooseWorkoutLiveActivityExtension/**"
      - "GooseSwiftTests/**"
      - "GooseSwift.xcodeproj/**"
      - ".github/workflows/swift-build.yml"
  pull_request: {}
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS (simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install Rust and iOS simulator target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Rust/core/target
          key: ${{ runner.os }}-cargo-sim-${{ hashFiles('Rust/core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sim-

      - name: Build
        run: |
          xcodebuild \
            -project GooseSwift.xcodeproj \
            -scheme GooseSwift \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build/DerivedData \
            build

  test:
    name: XCTest (simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install Rust and iOS simulator target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-ios-sim

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Rust/core/target
          key: ${{ runner.os }}-cargo-sim-${{ hashFiles('Rust/core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-sim-

      - name: Test
        run: |
          xcodebuild test \
            -project GooseSwift.xcodeproj \
            -scheme GooseSwift \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build/DerivedData \
            -enableCodeCoverage NO

  build-release:
    name: Build iOS Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install Rust and iOS target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-ios-sim

      - name: Build Release
        run: |
          xcodebuild \
            -project GooseSwift.xcodeproj \
            -scheme GooseSwift \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            -derivedDataPath build/DerivedData-release \
            build

  swift-gate:
    name: swift / gate
    needs: [build, test, build-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          build="${{ needs.build.result }}"
          test="${{ needs.test.result }}"
          release="${{ needs.build-release.result }}"
          if [[ "$build" == "failure" || "$build" == "cancelled" ]]; then
            echo "build failed: $build" && exit 1
          fi
          if [[ "$test" == "failure" || "$test" == "cancelled" ]]; then
            echo "test failed: $test" && exit 1
          fi
          if [[ "$release" == "failure" || "$release" == "cancelled" ]]; then
            echo "release build failed: $release" && exit 1
          fi
          echo "swift CI passed (build=$build, test=$test, release=$release)"
